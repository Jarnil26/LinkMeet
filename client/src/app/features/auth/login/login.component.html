<div class="auth-page">
  <div class="auth-container animate-slideUp">
    <div class="auth-header">
      <a routerLink="/" class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="url(#logGrad)"/>
          <path d="M10 12L16 8L22 12V20L16 24L10 20V12Z" stroke="white" stroke-width="2" fill="none"/>
          <circle cx="16" cy="16" r="3" fill="white"/>
          <defs><linearGradient id="logGrad" x1="0" y1="0" x2="32" y2="32">
            <stop stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/>
          </linearGradient></defs>
        </svg>
      </a>
      <h1>Welcome back</h1>
      <p>Sign in to your LinkMeet account</p>
    </div>

    @if (error) {
      <div class="error-alert">{{ error }}</div>
    }

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </p>
  </div>
</div>
